<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hiduppp Jokowiiii - Sunset Nebula</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body data-theme="sunset">
    <div class="nebula-stars"></div>
    <div class="nebula-twinkling"></div>
    <div class="nebula-aurora"></div>
    <div class="nebula-clouds"></div>
    
    <div class="nebula-container">
        <div class="nebula-profile">
            <div class="nebula-avatar">
                <img src="https://raw.githubusercontent.com/NdizzXD270/linkt/main/avatars/1772350844740.jpg" alt="Hiduppp Jokowiiii">
            </div>
            <h1 class="nebula-username">Hiduppp Jokowiiii</h1>
            <p class="nebula-bio">✦ Created By Zxx ✦</p>
        </div>

        <div class="nebula-send-section">
            <h3><i class="fas fa-paper-plane"></i> Send Nama Lu</h3>
            <form id="nebulaForm">
                <input type="text" id="visitorName" placeholder="Nama Lu ..." required>
                <button type="submit" class="nebula-btn">
                    <span>kirim</span>
                    <i class="fas fa-rocket"></i>
                </button>
            </form>
            <p id="nebulaResponse" class="nebula-response"></p>
        </div>

        <div class="nebula-links">
            
            <a href="#" class="link-card telegram" target="_blank">
                <i class="fab fa-telegram"></i>
                <span>Telegram</span>
                <small>Buka</small>
            </a>
        </div>

        <div class="nebula-footer">
            <p>Created Hiduppp Jokowiiii</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
